services:
  db:
    image: agnohq/pgvector:16
    container_name: googly-db
    restart: always
    environment:
      POSTGRES_USER: googly
      POSTGRES_PASSWORD: googly
      POSTGRES_DB: googly
    ports:
      - "5432:5432"
    volumes:
      - googly_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U googly"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    container_name: googly-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - googly_redisdata:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  worker:
    image: ghcr.io/astral-sh/uv:python3.11-bookworm
    container_name: googly-worker
    user: "1000:1000"
    working_dir: /app
    volumes:
      - ../apps/api:/app
      - ../.env:/app/.env:ro
      - uv_cache:/home/user/.cache/uv
    command: uv run arq app.tasks.worker.WorkerSettings
    environment:
      DATABASE_URL: postgresql+asyncpg://googly:googly@db:5432/googly
      REDIS_URL: redis://redis:6379/0
      SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
      REQUESTS_CA_BUNDLE: /etc/ssl/certs/ca-certificates.crt
      UV_CACHE_DIR: /tmp/uv-cache
      UV_PROJECT_ENVIRONMENT: /tmp/.venv
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - default

volumes:
  googly_pgdata:
    external: true
    name: googly_googly_pgdata
  googly_redisdata:
    external: true
    name: googly_googly_redisdata
  uv_cache:

networks:
  default:
    name: googly-network
